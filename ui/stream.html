<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RehabPanel — live negotiation</title>
<style>
  :root{--paper:#eef3f7;--panel:#fff;--ink:#0f2942;--muted:#5a7287;--line:#dde6ee;--line2:#e9eff5;
    --teal:#0b6e63;--teal-d:#085a51;--teal-soft:#e6f3f0;--red:#cc4b3e;--amber:#b06d12;--slate:#51657a;--purple:#9a4fb0;--blue:#2563a8;}
  *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);
    font:400 15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:20px 20px 60px}
  header{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:2px solid var(--teal)}
  .mk{width:32px;height:32px}.bn{font-weight:800;font-size:20px}.bn .a{color:var(--teal)}
  .tag{margin-left:auto;font:600 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 11px;background:#fff}
  .status{display:flex;align-items:center;gap:10px;margin:16px 0;font-size:14px;color:var(--muted)}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);animation:pulse 1s infinite}
  .dot.done{background:var(--teal);animation:none}.dot.err{background:var(--red);animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;margin-bottom:18px}
  .kpi{background:#fff;padding:13px 15px}.kpi .v{font:800 26px/1 ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums;transition:color .3s}
  .kpi .k{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
  .kpi .v.up{color:var(--teal)}
  h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;font-weight:700}
  .feed{display:flex;flex-direction:column;gap:14px}
  .round{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    box-shadow:0 1px 2px rgba(15,41,66,.05);animation:slidein .35s ease both}
  @keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .rnum{font:700 12px/1 ui-monospace,Menlo,monospace;color:#fff;background:var(--teal);border-radius:6px;padding:4px 8px}
  .slot{font-weight:700}.rval{margin-left:auto;font:700 13px/1 ui-monospace,Menlo,monospace;color:var(--teal-d)}
  .turn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-left:3px solid var(--tc,#5a7287);
    background:#fbfdfd;border:1px solid var(--line2);border-radius:9px;margin:6px 0;font-size:14px}
  .turn.op{background:#fff7ef}.turn.ct{background:#fbf6fd}.turn.ru{background:var(--teal-soft);border-left-color:var(--blue)}
  .who{font-weight:700;color:var(--tc)}.st{font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 7px}
  .txt{color:#26425c}.tv{margin-left:auto;font:600 12px/1 ui-monospace,Menlo,monospace;color:var(--muted)}
  .coal{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13px;color:var(--muted)}
  .chip{font:600 11px/1 ui-monospace,Menlo,monospace;border:1px solid;border-radius:999px;padding:3px 8px;margin:0 2px}
  .agreed{margin-left:auto;font:700 11px/1 ui-monospace,Menlo,monospace;color:#fff;background:var(--teal);border-radius:999px;padding:5px 11px}
  .muted{color:var(--muted)}
</style></head><body>
<div class="wrap">
  <header>
    <svg class="mk" viewBox="0 0 28 28"><rect x="1" y="1" width="26" height="26" rx="7" fill="#e6f3f0" stroke="#0b6e63" stroke-width="1.5"/><path d="M4 15 H9 L11 9 L15 19 L17 13 H24" fill="none" stroke="#0b6e63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="bn">Rehab<span class="a">Panel</span> · live negotiation</div>
    <div class="tag" id="mode">real Qwen · streaming</div>
  </header>

  <div class="status"><span class="dot" id="dot"></span><span id="msg">Connecting to the agent society…</span></div>

  <div class="strip">
    <div class="kpi"><div class="v" id="k-round">—</div><div class="k">round</div></div>
    <div class="kpi"><div class="v" id="k-value">—</div><div class="k">plan value</div></div>
    <div class="kpi"><div class="v" id="k-cont">—</div><div class="k">continuity breaks</div></div>
    <div class="kpi"><div class="v" id="k-pref">—</div><div class="k">pref mismatches</div></div>
  </div>

  <h2>Negotiation — five advocates + a charge-nurse referee, in real time</h2>
  <div class="feed" id="feed"></div>
</div>
<script>
const ACOLOR={priority:'#cc4b3e',window:'#b06d12',continuity:'#0b6e63',capacity:'#51657a',preference:'#9a4fb0',referee:'#2563a8',
              Priority:'#cc4b3e','Follow-up Window':'#b06d12',Continuity:'#0b6e63',Capacity:'#51657a',Preference:'#9a4fb0','Charge-Nurse Referee':'#2563a8'};
const IC={objects:'⚑',proposes:'✎',counters:'⇄',supports:'▲',opposes:'▼',ruling:'⚖'};
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function bump(id,val,cls){const el=$(id);el.textContent=val;if(cls){el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),400);}}
function roundCard(d){
  const tr=d.transcript; const feed=$('#feed');
  const div=document.createElement('div'); div.className='round';
  let turns='';
  if(tr && tr.turns){
    turns=tr.turns.map(t=>{
      const c=ACOLOR[t.role]||ACOLOR[t.agent]||'#5a7287';
      const cls='turn'+(t.stance==='ruling'?' ru':t.stance==='opposes'?' op':t.stance==='counters'?' ct':'');
      const v=Number(t.value);
      return `<div class="${cls}" style="--tc:${c}"><span class="who">${IC[t.stance]||'•'} ${esc(t.role)}</span>`+
             `<span class="st">${esc(t.stance)}</span><span class="txt">${esc(t.text)}</span>`+
             (Number.isFinite(v)&&v!==0?`<span class="tv">${v>0?'+':''}${v}</span>`:'')+`</div>`;
    }).join('');
  }
  const chip=a=>`<span class="chip" style="border-color:${ACOLOR[a]||'#5a7287'};color:${ACOLOR[a]||'#5a7287'}">${esc(a)}</span>`;
  const coal=tr?`<div class="coal">FOR ${(tr.coalition_for||[]).map(chip).join('')||'—'} <b>${tr.for_value??''}</b>
     · vs · AGAINST ${(tr.coalition_against||[]).map(chip).join('')||'—'} <b>${tr.against_value??''}</b>
     <span class="agreed">${tr.decision==='apply'?'✓ AGREED':'✕ rejected'}</span></div>`:'';
  div.innerHTML=`<div class="rhead"><span class="rnum">ROUND ${d.round}</span>`+
    (tr?`<span class="slot">${esc(tr.contested)}</span>`:'<span class="muted">draft</span>')+
    `<span class="rval">value ${d.value}</span></div>${turns}${coal}`;
  feed.appendChild(div);
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}
const es=new EventSource('/api/stream');
es.onmessage=e=>{
  const d=JSON.parse(e.data);
  if(d.hello){ $('#msg').textContent=`Negotiating over ${d.patients} patients and ${d.slots} slots — watch the debate build…`; return; }
  if(d.error){ $('#dot').className='dot err'; $('#msg').textContent='Stream error: '+d.error; es.close(); return; }
  if(d.done){ $('#dot').className='dot done'; $('#msg').textContent='Negotiation complete — the society reached agreement.'; es.close(); return; }
  bump('#k-round', d.round);
  bump('#k-value', d.value, 'up');
  bump('#k-cont', d.continuity_breaks);
  bump('#k-pref', d.preference_mismatches);
  if(d.transcript) roundCard(d);   // skip the round-0 draft card (no debate)
  else if(d.round===0){ $('#k-value').textContent=d.value; }
};
es.onerror=()=>{ if($('#dot').className.indexOf('done')<0){ $('#dot').className='dot err'; $('#msg').textContent='Connection closed.'; } };
</script>
</body></html>
