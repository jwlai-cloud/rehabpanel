<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RehabPanel — Coordinator</title>
<style>
  :root{
    --paper:#eef3f7; --panel:#fff; --ink:#0f2942; --muted:#5a7287; --line:#dde6ee;
    --line2:#e9eff5; --col:#f5f8fb; --teal:#0b6e63; --teal-d:#085a51; --teal-soft:#e6f3f0;
    --red:#cc4b3e; --amber:#c28a14; --green:#2f8f6e; --slate:#51657a;
    --shadow:0 1px 2px rgba(15,41,66,.06),0 4px 14px rgba(15,41,66,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:14px/1.5 "Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums}
  .imp{font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .dg{color:var(--teal-d);font-weight:800}   /* impact: improved */
  .db{color:var(--red);font-weight:800}       /* impact: worsened */
  .d0{color:var(--muted)}
  .livebtn{background:#2563a8;color:#fff;border:0;border-radius:9px;padding:8px 13px;font-weight:700;cursor:pointer}
  .livebtn:hover{background:#1e5391} .livebtn:disabled{opacity:.7;cursor:default}
  .livebtn.on{animation:lpulse 1.1s infinite}
  @keyframes lpulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,168,.5)}50%{box-shadow:0 0 0 7px rgba(37,99,168,0)}}
  header{background:var(--panel);border-bottom:1px solid var(--line);border-top:3px solid var(--teal);
    padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:800}
  header .sub{color:var(--muted);font-size:13px}
  .gap-badge{margin-left:auto;background:var(--teal-soft);color:var(--teal-d);font-weight:700;
    padding:5px 12px;border-radius:999px;font-size:13px}
  button{font:inherit;cursor:pointer;border-radius:9px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);padding:7px 12px}
  button:hover{border-color:var(--teal);color:var(--teal)}
  button.primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700}
  button.primary:hover{background:var(--teal-d);color:#fff}
  button.danger:hover{border-color:var(--red);color:var(--red)}
  nav{display:flex;gap:6px;padding:10px 20px 0;flex-wrap:wrap}
  nav button{border-radius:9px 9px 0 0;border-bottom:none;color:var(--muted)}
  nav button.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:700}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 20px;background:var(--panel);
    border-bottom:1px solid var(--line)}
  .bar .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .alerts{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px;margin-top:10px}
  .alert{font-size:12.5px;padding:5px 11px;border-radius:8px;border:1px solid}
  .alert.incident{background:#fff4e5;border-color:#f0c27a;color:#8a5a12}
  .alert.critical{background:#fbe9e7;border-color:#e9a99f;color:#a3392f}
  .alert.warn{background:#fff8e6;border-color:#ecd28a;color:#866a12}
  main{padding:16px 20px;display:flex;flex-direction:column;gap:16px;max-width:1500px;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .panel h2{margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700}
  .grid2{display:grid;grid-template-columns:1.25fr .9fr;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  /* calendar */
  .scrub{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .scrub input[type=range]{flex:1;min-width:150px;accent-color:var(--teal)}
  .scrub .status{font-size:13px;color:var(--muted)} .scrub .status b{color:var(--ink)}
  .cal{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .day{background:var(--col);border:1px solid var(--line2);border-radius:10px;padding:8px;min-height:60px}
  .day h3{margin:0 0 8px;font-size:12px;font-weight:700;text-align:center;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .card{background:var(--panel);border:1px solid var(--line2);border-left:4px solid var(--green);border-radius:8px;
    padding:6px 8px;margin-bottom:6px;font-size:12px}
  .card.brk{border-left-color:var(--amber)} .card.moved{box-shadow:0 0 0 2px var(--teal)}
  .card .nm{font-weight:600;display:flex;justify-content:space-between;gap:6px}
  .card .meta{color:var(--muted);font-size:11px;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .acu{color:#fff;background:var(--red);border-radius:5px;padding:0 5px;font-size:10px;font-weight:700}
  .acu.lo{background:var(--slate)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .pin{color:var(--teal);font-size:10px;font-weight:700} .warn{color:var(--amber);font-size:10px}
  /* agents */
  .agents{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .agent{border:1px solid var(--line2);border-radius:9px;padding:8px 10px;background:var(--col)}
  .agent .an{font-weight:700;text-transform:capitalize}
  .agent.ref{grid-column:1/-1;background:var(--teal-soft);border-color:#bfe0d8}
  .agent .ao{color:var(--muted);font-size:12px} .agent .at{font-size:10.5px;color:var(--teal-d);font-weight:700}
  /* log */
  .log{max-height:300px;overflow:auto;font-size:12.5px} .log li{list-style:none;padding:8px 10px;border:1px solid var(--line2);
    border-left:3px solid var(--teal);border-radius:8px;margin-bottom:7px;background:var(--panel)}
  .log li.fresh{background:var(--teal-soft)} .log .obj{color:var(--muted);font-size:11px}
  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 8px;border-bottom:1px solid var(--line2);text-align:left}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
  tr.clickable:hover{background:var(--col);cursor:pointer}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .tile{border:1px solid var(--line2);border-radius:11px;padding:12px 14px;background:var(--col)}
  .tile .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums} .tile .k{color:var(--muted);font-size:12px}
  .tile .v.good{color:var(--teal)} .tile .v.bad{color:var(--red)}
  /* society vs single-agent comparison */
  .cmpgap{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px 9px;background:var(--teal-soft);border:1px solid #bfe0d8;border-radius:10px;padding:8px 15px;margin:2px 0 4px}
  .cmpgap>b{font-size:23px;color:var(--teal-d);font-variant-numeric:tabular-nums;font-weight:800}
  .cmpgap span{font-size:12px;color:var(--muted)}
  .cmp{min-width:0}
  .cmptab{width:100%;table-layout:fixed;border-collapse:collapse;font-size:13px;margin-top:12px}
  .cmptab th{text-align:right;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid var(--line)}
  .cmptab th:first-child{text-align:left}
  .cmptab td{padding:7px 10px;border-bottom:1px solid var(--line2);text-align:right;font-variant-numeric:tabular-nums}
  .cmptab td:first-child{text-align:left;color:var(--muted)}
  .cmptab td.win{color:var(--teal-d);font-weight:800;background:var(--teal-soft)}
  .cmptab .hint{font-size:11px;color:var(--muted);font-weight:400}
  /* sliders */
  .rule{display:grid;grid-template-columns:130px 1fr 48px;gap:12px;align-items:center;margin-bottom:12px}
  .rule input{width:100%;accent-color:var(--teal)}
  /* gauge bars */
  .gbar{height:14px;background:var(--line2);border-radius:7px;overflow:hidden;margin:4px 0 2px}
  .gbar > i{display:block;height:100%;background:var(--teal)}
  .gbar > i.hot{background:var(--red)}
  .muted{color:var(--muted)} .right{margin-left:auto}
  svg .base{stroke:var(--slate);stroke-dasharray:4 3} svg .ln{stroke:var(--teal);fill:none;stroke-width:2.5}
  svg .dotp{fill:var(--teal)} svg text{fill:var(--muted);font-size:11px}
  /* negotiation transcript */
  .contested{margin-bottom:10px;font-size:13px;color:var(--muted)}
  .chat{display:flex;flex-direction:column;gap:6px}
  .bub{border:1px solid var(--line2);border-left:4px solid var(--slate);border-radius:8px;
    padding:6px 10px;font-size:12.5px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
  .bub .who{font-weight:700} .bub .txt{flex:1}
  .bub .stance{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
  .bub .v{font-variant-numeric:tabular-nums;color:var(--muted)}
  .bub.ruling{background:var(--teal-soft);border-left-color:var(--teal);font-weight:600}
  .bub.wf{animation:wf .32s ease both}
  @keyframes wf{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.bub.wf{animation:none}}
  .coal{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;font-size:12.5px}
  .coal .side{display:flex;align-items:center;gap:6px} .coal .side b{font-variant-numeric:tabular-nums}
  .coal .lbl{color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.06em;font-weight:700}
  .coal .vs{color:var(--muted)}
  .chip{border:1px solid;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:600}
  .verdict{margin-left:auto;padding:3px 12px;border-radius:999px;font-weight:700}
  .verdict.ok{background:var(--teal-soft);color:var(--teal-d)} .verdict.no{background:#ececec;color:#777}
  .agent{cursor:pointer} .agent:hover{border-color:var(--teal)}
  .agent:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .rejnote{margin-top:8px;font-size:11.5px;color:var(--muted);font-style:italic}
  .logic{margin:-4px 0 12px;font-size:12px;color:var(--muted);line-height:1.5}.logic b{color:var(--ink)}
  .prompt{white-space:pre-wrap;background:#0f2942;color:#e7eef5;border-radius:9px;padding:12px;
    font-size:11.5px;line-height:1.5;max-height:240px;overflow:auto;margin-top:10px;
    font-family:ui-monospace,Menlo,Consolas,monospace}
</style>
</head>
<body>
<header>
  <svg width="24" height="24" viewBox="0 0 28 28" aria-hidden="true"><rect x="1" y="1" width="26" height="26" rx="7" fill="#e6f3f0" stroke="#0b6e63" stroke-width="1.5"/><path d="M4 15 H9 L11 9 L15 19 L17 13 H24" fill="none" stroke="#0b6e63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <h1>RehabPanel <span class="muted" style="font-weight:500">· Coordinator</span></h1>
  <span class="sub" id="scenario">loading…</span>
  <span class="gap-badge" id="gap"></span>
  <button id="reset">↺ Reset</button>
</header>
<nav id="nav"></nav>
<div class="bar">
  <span class="lbl">Incident</span>
  <button class="danger" onclick="act('POST','/incident/sick')">🤒 Nurse sick</button>
  <button class="danger" onclick="act('POST','/incident/cancel')">✕ Patient cancels</button>
  <button class="danger" onclick="act('POST','/incident/referral')">＋ Urgent referral</button>
  <button class="right" id="snd" onclick="toggleSound()" title="speak referee rulings + alert on incidents">🔇 Sound</button>
  <button class="primary" onclick="act('POST','/replan')">⟳ Re-plan</button>
</div>
<div class="alerts" id="alerts"></div>
<main id="main"></main>
<script>
const $=s=>document.querySelector(s), esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const CLR=['#0b6e63','#2563a8','#9a4fb0','#b06d12','#3a7d44','#a33b5e']; let CMAP={};
const VIEWS=[['schedule','Schedule'],['caseload','Caseload'],['team','Team'],['rules','Rules'],['kpis','KPIs']];
let ST=null, view='schedule', cur=0, timer=null;

/* --- fun: the panel speaks the referee + alerts on incidents (browser-native,
   free, no Qwen cost). Off by default; toggle with the 🔊 button. --- */
let SOUND=false, AC=null;
function toggleSound(){ SOUND=!SOUND; $('#snd').textContent=(SOUND?'🔊':'🔇')+' Sound';
  if(SOUND){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); }catch(e){} say('Sound on'); }
  else { try{ speechSynthesis.cancel(); }catch(e){} } }
function say(t){ if(!SOUND||!t)return; try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=1.07; speechSynthesis.speak(u);}catch(e){} }
function tone(freq,dur,vol,type){ if(!SOUND||!AC)return; try{ const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(AC.destination); const t=AC.currentTime;
  g.gain.setValueAtTime(vol||0.15,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03);}catch(e){} }
const chime=()=>{tone(880,0.18,0.14);setTimeout(()=>tone(1320,0.22,0.12),110);};            // approved
const buzz =()=>tone(150,0.4,0.2,'square');                                                  // rejected
const alarm=()=>{tone(500,0.16,0.24,'sawtooth');setTimeout(()=>tone(360,0.3,0.24,'sawtooth'),150);}; // incident / critical

const api=(m,p,b)=>fetch('/api'+p,{method:m,headers:{'Content-Type':'application/json'},
  body:b?JSON.stringify(b):undefined}).then(r=>r.json());

async function boot(){ ST=await fetch('/api/state').then(r=>r.json()); init();
  loadReplay(false); }                    // default view = the recorded real Qwen negotiation
// load the recorded real-Qwen run into ST as the default/played negotiation (no tokens)
async function loadReplay(autoplay){
  const ev=await fetch('/api/replay').then(r=>r.json()).catch(()=>null);
  if(!ev||!ev.events||!ev.events.length) return false;
  ST.rounds=ev.events.map(_mkRound);
  const fs=ST.rounds[ST.rounds.length-1].score;                      // comparison + header reflect the real negotiated result
  if(ST.scores&&ST.scores.committed) Object.assign(ST.scores.committed,
    {value:fs.value,continuity_breaks:fs.continuity_breaks,preference_mismatches:fs.preference_mismatches,patients_scheduled:fs.patients_scheduled});
  if(ST.scores&&ST.scores.baseline) ST.headline_gap=Math.round((fs.value-ST.scores.baseline.value)*10)/10;
  // session timeline = the real recorded climb (draft 160 → 181), not the deterministic 212 seed
  ST.score_history=ST.rounds.map((r,i)=>({value:r.score.value, label:(i?('r'+r.round):'draft')}));
  view='schedule';
  if(autoplay){ cur=0; render(); play(); } else { cur=ST.rounds.length-1; render(); }
  return true; }
async function act(m,p,b){ stop(); ST=await api(m,p,b); cur=ST.rounds.length-1; render();
  if(p.indexOf('/incident/')===0){ alarm();
    const a=(ST.alerts||[]).find(x=>x.level==='incident'); say('Incident. '+(a?a.msg:''));
    if((ST.alerts||[]).some(x=>x.level==='critical')){ setTimeout(alarm,600); }   // anything wrong → alert loud
  } else if(p==='/replan'){ const d=ST.disruption; say('Re-planned. '+(d?d.changed+' of '+d.total+' appointments changed.':'')); } }
function init(){
  (ST.clinicians||[]).forEach((c,i)=>CMAP[c.id]=CLR[i%CLR.length]);
  $('#reset').onclick=async()=>{ await api('POST','/reset'); loadReplay(false); };  // clear session, then restore the recorded-run view (never the deterministic 212)
  $('#nav').innerHTML=VIEWS.map(([k,l])=>`<button data-v="${k}">${l}</button>`).join('');
  $('#nav').querySelectorAll('button').forEach(b=>b.onclick=()=>{view=b.dataset.v;location.hash=view;stop();render();});
  const h=location.hash.slice(1); if(VIEWS.some(v=>v[0]===h))view=h;   // deep-link to a view
  cur=ST.rounds.length-1;
  const opp=ST.rounds.findIndex(r=>r.transcript&&(r.transcript.coalition_against||[]).length);
  if(opp>=0)cur=opp;   // lead with a genuinely contested round (real disagreement) when one exists
  const rp=new URLSearchParams(location.search).get('r'); if(rp!==null)cur=Math.max(0,+rp);  // deep-link a round
  render();
}
function render(){
  const m=ST.meta;
  $('#scenario').textContent=`${ST.counts.patients} patients · ${ST.counts.slots} slots · demand/capacity ${m.ratio} · week of ${m.t0}`;
  $('#gap').textContent=`initial gap vs single agent: +${ST.headline_gap}`;
  $('#nav').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.v===view));
  $('#alerts').innerHTML=(ST.alerts||[]).map(a=>`<span class="alert ${a.level}">${esc(a.msg)}</span>`).join('');
  ({schedule:vSchedule,caseload:vCaseload,team:vTeam,rules:vRules,kpis:vKpis}[view])();
}

/* ---------- Schedule + Negotiation ---------- */
function cmpNum(x){ return parseFloat(String(x).replace('%','').split('/')[0]); }
function cmpBlock(){                                   // society vs single-agent, same scorer
  const s=ST.scores; if(!s||!s.baseline||!s.committed) return '';
  const b=s.baseline, c=s.committed;
  const gap=Math.round((c.value-b.value)*10)/10;
  const rows=[
    ['Total score', b.value, c.value, 'hi', 'higher is better'],
    ['Patients scheduled', b.patients_scheduled, c.patients_scheduled, 'hi', ''],
    ['High-acuity coverage', Math.round(b.acuity_coverage*100)+'%', Math.round(c.acuity_coverage*100)+'%', 'hi', ''],
    ['Overdue days', b.overdue_days, c.overdue_days, 'lo', 'lower is better'],
    ['Continuity breaks', b.continuity_breaks, c.continuity_breaks, 'lo', ''],
    ['Preference mismatches', b.preference_mismatches, c.preference_mismatches, 'lo', ''],
  ];
  const body=rows.map(([lbl,bv,cv,dir,hint])=>{
    const nb=cmpNum(bv), nc=cmpNum(cv); let bw='',cw='';
    if(nb!==nc){ (((dir==='hi')?nc>nb:nc<nb) ? cw='win' : bw='win'); }
    return `<tr><td>${esc(lbl)}${hint?` <span class="hint">(${hint})</span>`:''}</td>`+
      `<td class="${bw} num">${esc(String(bv))}</td><td class="${cw} num">${esc(String(cv))}</td></tr>`;
  }).join('');
  return `<div class="panel cmp">
     <h2>Society vs single agent — same week, same scorer</h2>
     <div class="cmpgap"><b>${gap>0?'+':''}${gap}</b><span>the society's multi-objective advantage — from negotiation, not a bigger model. Both plans use the <b>same scorer</b>. The single agent is one Qwen pass; the society is 5 advocates + a referee negotiating, all Qwen.</span></div>
     <table class="cmptab"><thead><tr><th>Objective</th><th>Single agent</th><th>Society (5+1)</th></tr></thead><tbody>${body}</tbody></table>
   </div>`;
}
function vSchedule(){
  const R=ST.rounds, last=R.length-1; if(cur>last)cur=last;
  $('#main').innerHTML=`
   ${cmpBlock()}
   <div class="panel">
     <h2>Negotiation — watch the society re-plan</h2>
     <div class="scrub">
       <button onclick="step(-1)">◀</button><button class="primary" id="play" onclick="replayDemo()" title="replay a recorded real Qwen negotiation — no tokens">▶ Replay</button>
       <button onclick="step(1)">▶</button>
       <button id="live" class="livebtn" onclick="runLive()" title="run a fresh real Qwen negotiation — every panel updates live each round">◉ Run live (Qwen)</button>
       <input type="range" id="sl" min="0" max="${last}" value="${cur}" oninput="setR(+this.value)">
       <span class="status num" id="st"></span>
     </div>
     <div class="cal" id="cal"></div>
   </div>
   <div class="panel">
     <h2>This round's negotiation — proposals · coalitions · ruling</h2>
     <div class="logic">Each advocate objects on its one objective → the top objection's advocate proposes a swap → advocates split into <b>FOR</b> / <b>AGAINST</b> coalitions → the referee brokers on the priority ranking (capacity ≻ acuity ≻ overdue ≻ continuity ≻ preference).</div>
     <div id="nego"></div>
   </div>
   <div class="grid2">
     <div class="panel"><h2>Conflict ledger — referee rulings</h2><ul class="log" id="log"></ul></div>
     <div class="panel">
       <h2>Agent society — click a role for its prompt</h2>
       <div class="agents">${ST.agents.map((a,i)=>`
         <div class="agent ${a.name==='referee'?'ref':''}" role="button" tabindex="0"
              aria-label="show ${a.name} prompt" onclick="togglePrompt(${i})"
              onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePrompt(${i})}">
           <div class="an" style="color:${ACOLOR[a.name]||'var(--ink)'}">${a.name}</div>
           <div class="ao">${esc(a.objective)}</div><div class="at">${a.tier}</div></div>`).join('')}</div>
       <pre id="prompt" class="prompt" style="display:none"></pre>
       <h2 style="margin-top:16px">Score per round vs single-agent baseline</h2>
       <div id="spark"></div>
     </div>
   </div>`;
  setR(cur);
}
function dlt(cur,prev,lowerBetter){ const d=Math.round((cur-prev)*10)/10;
  if(!d) return '<span class="d0">0</span>';
  const good=lowerBetter?d<0:d>0; return `<span class="${good?'dg':'db'}">${d>0?'+':''}${d}</span>`; }
function setR(i){ cur=i; const R=ST.rounds[i], last=ST.rounds.length-1, draft=R.round===0;
  $('#sl').value=i;
  let impact='';
  if(!draft && i>0){ const p=ST.rounds[i-1].score, s=R.score;   // this decision's measurable impact
    impact=` · <span class="imp">impact: value ${dlt(s.value,p.value,false)} · continuity ${dlt(s.continuity_breaks,p.continuity_breaks,true)} · pref ${dlt(s.preference_mismatches,p.preference_mismatches,true)}</span>`; }
  $('#st').innerHTML=`Round <b>${R.round}</b>/${ST.rounds[last].round} · value <b>${R.score.value}</b>`+
    (draft?' · acuity-first draft':` · ${R.moved} moved${impact}`);
  // calendar
  $('#cal').innerHTML=ST.days.map(d=>`<div class="day"><h3>${d}</h3>`+
    R.cells.filter(c=>c.day===d).map(c=>card(c,!draft&&c.round===R.round)).join('')+`</div>`).join('');
  // ledger (cumulative, last fresh)
  const fresh=new Set(R.ledger.slice(i>0?ST.rounds[i-1].ledger.length:0));
  $('#log').innerHTML=R.ledger.length?R.ledger.map(l=>`<li class="${fresh.has(l)?'fresh':''}">${esc(l)}</li>`).join('')
    :'<li class="muted">No rulings yet.</li>';
  $('#log').scrollTop=$('#log').scrollHeight;
  $('#spark').innerHTML=spark(ST.rounds.slice(0,i+1).map(r=>r.score.value), ST.scores.baseline.value);   // climbs as rounds advance
  renderNego(R);
  if(SOUND && timer && R.transcript){                 // announce rulings during playback only
    const dec=R.transcript.decision==='apply';
    say('Round '+R.round+': '+(dec?'approved':'rejected')); dec?chime():buzz();
  }
}
function objText(o){ const e=Object.entries(o||{}); return e.length?'['+e.map(([k,v])=>`${k}×${v}`).join(', ')+']':''; }
const ACOLOR={priority:'#cc4b3e',window:'#b06d12',continuity:'#0b6e63',capacity:'#51657a',preference:'#9a4fb0',referee:'#2563a8'};
const STANCE_IC={objects:'⚑',proposes:'✎',counters:'⇄',ruling:'⚖'};
function renderNego(R){
  const el=$('#nego'); if(!el) return;
  const tr=R.transcript;
  if(!tr){ el.innerHTML='<div class="muted">Acuity-first draft — negotiation begins next round.</div>'; return; }
  const turns = tr.turns;
  const dec=tr.decision==='apply';
  const chip=a=>`<span class="chip" style="border-color:${ACOLOR[a]||'#5a7287'};color:${ACOLOR[a]||'#5a7287'}">${esc(a)}</span>`;
  const bubbles=turns.map((t,i)=>{
    const c=ACOLOR[t.agent]||'#5a7287';
    const cls='bub wf'+(t.stance==='ruling'?' ruling':'');
    const v=Number(t.value);   // agent JSON may carry a non-numeric value
    return `<div class="${cls}" style="border-left-color:${c};animation-delay:${(i*0.12).toFixed(2)}s">
      <span class="who" style="color:${c}">${STANCE_IC[t.stance]||'•'} ${esc(t.role)}</span>
      <span class="stance">${esc(t.stance)}</span><span class="txt">${esc(t.text)}</span>
      ${Number.isFinite(v)&&v!==0?`<span class="v">${v>0?'+':''}${v}</span>`:''}</div>`;
  }).join('');
  const coal = `<div class="coal">
      <div class="side"><span class="lbl">Coalition FOR</span>${tr.coalition_for.map(chip).join('')||'<span class="muted">—</span>'}<b>${tr.for_value}</b></div>
      <span class="vs">vs</span>
      <div class="side"><span class="lbl">AGAINST</span>${tr.coalition_against.map(chip).join('')||'<span class="muted">—</span>'}<b>${tr.against_value}</b></div>
      <span class="verdict ${dec?'ok':'no'}">${dec?'✓ AGREED':'✕ REJECTED'}</span>
    </div>`+((tr.rejected&&tr.rejected.length)?`<div class="rejnote">Referee first rejected ${tr.rejected.length} proposal(s) this round: `+
      tr.rejected.map(r=>esc(r.role+' @ '+r.contested)).join('; ')+`</div>`:'');
  el.innerHTML=`<div class="contested">Contested slot: <b>${esc(tr.contested)}</b></div>
    <div class="chat">${bubbles}</div>${coal}`;
}
function togglePrompt(i){ const el=$('#prompt'), a=ST.agents[i]; if(!el)return;
  if(el.style.display!=='none' && el.dataset.i==i){ el.style.display='none'; return; }
  el.textContent=a.prompt||'(no prompt)'; el.dataset.i=i; el.style.display='block'; }
function card(c,moved){ const a=c.acuity>=7?'acu':'acu lo';
  return `<div class="card ${c.continuity_ok?'':'brk'} ${moved?'moved':''}">
   <div class="nm"><span>${esc(c.patient)}</span><span class="${a}">A${c.acuity}</span></div>
   <div class="meta"><span class="num">${c.time}</span>
   <span><i class="dot" style="background:${CMAP[c.clinician_id]||'#5a7287'}"></i> ${esc(c.clinician)}</span>
   <span>${c.mode}</span>${moved?'<span class="pin">↔</span>':''}${c.pref_ok?'':'<span class="warn">⚠</span>'}</div></div>`; }
function step(d){ stop(); setR(Math.max(0,Math.min(ST.rounds.length-1,cur+d))); }
function play(){ if(timer)return stop(); if(cur>=ST.rounds.length-1)setR(0); $('#play').textContent='⏸ Pause';
  timer=setInterval(()=>{ if(cur>=ST.rounds.length-1)return stop(); setR(cur+1); },1200); }
function stop(){ if(timer){clearInterval(timer);timer=null;} const p=$('#play'); if(p)p.textContent='▶ Replay'; }
// ---- replay: load a RECORDED real Qwen negotiation and animate through it (no tokens) ----
async function replayDemo(){
  if(timer)return stop();                                    // toggle: pause if playing
  if(liveES){liveES.close();liveES=null;}
  if(!await loadReplay(true)) $('#st').innerHTML='<b>Replay:</b> no recording';  // reload from round 0 and animate
}
// ---- live: stream a REAL Qwen negotiation into the same panels, round by round ----
let liveES=null;
function _mkRound(d){ return {
  round:d.round,
  score:{value:d.value, continuity_breaks:d.continuity_breaks, preference_mismatches:d.preference_mismatches, patients_scheduled:d.scheduled},
  cells:d.cells||[], transcript:d.transcript||null, ledger:d.ledger||[],
  moved:(d.cells||[]).filter(c=>c.round===d.round).length, objections:{} }; }
function runLive(){
  stop(); if(liveES){liveES.close();liveES=null;}
  const btn=$('#live'); btn.disabled=true; btn.textContent='◉ Live…'; btn.classList.add('on');
  ST.rounds=[];                                   // stream a fresh negotiation in
  const tok=new URLSearchParams(location.search).get('token');   // token-gated deploy: forward /?token=… to the stream
  let got=false;                                  // did the stream produce anything? distinguishes a 401 gate from a real run
  liveES=new EventSource('/api/stream'+(tok?('?token='+encodeURIComponent(tok)):''));
  const endLive=lbl=>{ if(liveES){liveES.close();liveES=null;} btn.disabled=false; btn.textContent='◉ Run live (Qwen)'; btn.classList.remove('on'); if(lbl)$('#st').innerHTML=lbl; };
  liveES.onmessage=e=>{ let d; try{d=JSON.parse(e.data);}catch(x){return;} got=true;
    if(d.hello){ $('#st').innerHTML='<b>Live:</b> real Qwen agents negotiating…'; return; }
    if(d.error){ endLive('<b>Live error:</b> '+esc(d.error)); return; }
    if(d.done){ endLive(); return; }
    ST.rounds.push(_mkRound(d));
    const last=ST.rounds.length-1; const sl=$('#sl'); if(sl)sl.max=last;
    setR(last);                                   // re-renders calendar + transcript + ledger + spark + KPIs
  };
  liveES.onerror=()=>{ endLive(got ? '' :          // nothing streamed = token gate (401) or network → guide the judge, don't just reset
    '<b>◉ Live is reserved for judges.</b> Open the link from our submission — it ends with <code>?token=…</code> — or press <b>▶ Replay</b> to watch a recorded real negotiation now.'); };
}

/* SVG sparkline */
function spark(vals, base){ const W=440,H=150,pad=28; const lo=Math.min(base,...vals),hi=Math.max(base,...vals);
  const x=i=>pad+i*(W-2*pad)/Math.max(1,vals.length-1), y=v=>H-pad-(v-lo)/((hi-lo)||1)*(H-2*pad);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%"><line class="base" x1="${pad}" y1="${y(base)}" x2="${W-pad}" y2="${y(base)}"/>
   <text x="${W-pad}" y="${y(base)-5}" text-anchor="end">baseline ${base}</text>
   <polyline class="ln" points="${pts}"/>${vals.map((v,i)=>`<circle class="dotp" cx="${x(i)}" cy="${y(v)}" r="3"/>`).join('')}
   <text x="${pad}" y="${H-6}">draft</text><text x="${W-pad}" y="${H-6}" text-anchor="end">round ${vals.length-1}</text></svg>`; }

/* ---------- Caseload ---------- */
function vCaseload(){ const P=[...ST.patients].sort((a,b)=>b.acuity-a.acuity);
  $('#main').innerHTML=`<div class="panel"><h2>Caseload — ${P.length} patients (${ST.counts.scheduled} scheduled)</h2>
   <table><thead><tr><th>Patient</th><th>Program</th><th class="r">Acuity</th><th>Primary</th><th>Pref</th><th>Due</th><th>Status</th></tr></thead>
   <tbody>${P.map(p=>`<tr class="clickable" onclick='drill(${JSON.stringify(p.id)})'>
     <td>${esc(p.name)}</td><td>${p.program}</td><td class="r"><span class="acu ${p.acuity>=7?'':'lo'}">A${p.acuity}</span></td>
     <td><i class="dot" style="background:${CMAP[p.primary]||'#5a7287'}"></i> ${p.primary}</td><td>${p.pref}</td>
     <td class="num">${p.due}</td><td>${p.scheduled?'<span style="color:var(--teal)">scheduled</span>':'<span class="warn">backlog</span>'}</td>
   </tr>`).join('')}</tbody></table><div id="drill"></div></div>`; }
function drill(id){ const p=ST.patients.find(x=>x.id===id); if(!p)return;
  $('#drill').innerHTML=`<div class="tile" style="margin-top:14px"><div class="k">${p.id}</div>
   <div style="font-size:18px;font-weight:700">${esc(p.name)} · A${p.acuity} · ${p.program}</div>
   <div class="muted">primary ${p.primary} · prefers ${p.pref} · follow-up due ${p.due} · ${p.scheduled?'scheduled this week':'in backlog'}</div></div>`; }

/* ---------- Team ---------- */
function vTeam(){ const cap=ST.capacity;
  $('#main').innerHTML=`<div class="panel"><h2>Care team — roster & capacity</h2>
   <table><thead><tr><th>Clinician</th><th>Status</th><th class="r">Booked</th><th class="r">Capacity</th><th class="r">Utilization</th></tr></thead>
   <tbody>${ST.clinicians.map(c=>{const u=cap.per.find(x=>x.id===c.id)||{used:0,pct:0};
     return `<tr><td><i class="dot" style="background:${CMAP[c.id]}"></i> ${esc(c.name)} <span class="muted">${c.id}</span></td>
     <td>${c.status==='available'?'<span style="color:var(--teal)">available</span>':'<span class="warn">'+esc(c.status)+'</span>'}</td>
     <td class="r num">${u.used}</td><td class="r num">${c.cap}</td>
     <td class="r"><div class="gbar"><i class="${u.pct>100?'hot':''}" style="width:${Math.min(100,u.pct)}%"></i></div>${u.pct}%</td></tr>`;}).join('')}
   </tbody></table>
   <p class="muted" style="margin-top:12px">Mark a nurse out via <b>Incident → Nurse sick</b>, then <b>Re-plan</b> — the society re-homes their patients with minimal disruption.</p></div>`; }

/* ---------- Rules ---------- */
function vRules(){ const w=ST.weights;
  const row=(k,lbl,max)=>`<div class="rule"><label>${lbl}</label>
    <input type="range" min="0" max="${max}" step="0.5" value="${w[k]}" oninput="this.nextElementSibling.textContent=this.value" data-k="${k}">
    <span class="num">${w[k]}</span></div>`;
  $('#main').innerHTML=`<div class="panel"><h2>Priority rule — what the society optimizes</h2>
   ${row('acuity','Acuity coverage',20)}${row('overdue','Overdue penalty',5)}
   ${row('continuity','Continuity',10)}${row('pref','Preference',6)}
   <button class="primary" onclick="applyRules()">Apply & re-plan</button>
   <p class="muted" style="margin-top:12px">Weights drive both the score and the agents' priorities — raise Continuity and the society protects primary-nurse matches harder; drop it to zero and it stops trading for them.</p></div>`; }
function applyRules(){ const b={}; document.querySelectorAll('.rule input').forEach(i=>b[i.dataset.k]=+i.value);
  act('POST','/rules',b); }

/* ---------- KPIs ---------- */
function vKpis(){ const s=ST.scores.committed, b=ST.scores.baseline, cap=ST.capacity, d=ST.disruption;
  const tile=(k,v,cls='')=>`<div class="tile"><div class="v ${cls}">${v}</div><div class="k">${k}</div></div>`;
  $('#main').innerHTML=`
   <div class="panel"><h2>This week — KPIs</h2><div class="tiles">
     ${tile('Schedule value',s.value,s.value>=b.value?'good':'bad')}
     ${tile('Capacity used',cap.overall_pct+'%')}
     ${tile('High-acuity seen',s.acuity_coverage>=1?'100%':Math.round(s.acuity_coverage*100)+'%')}
     ${tile('Continuity breaks',s.continuity_breaks)}
     ${tile('Overdue days',s.overdue_days)}
     ${tile('Pref mismatches',s.preference_mismatches)}
     ${d?tile('Replan disruption',d.changed+'/'+d.total,'good'):''}
   </div></div>
   <div class="grid2">
     <div class="panel"><h2>Session timeline — incidents drop, re-plans recover</h2><div id="sess"></div></div>
     <div class="panel"><h2>Capacity by clinician</h2>${cap.per.map(c=>`
       <div style="margin-bottom:8px"><div style="display:flex"><span>${esc(c.name)}</span><span class="right num">${c.used}/${c.cap}</span></div>
       <div class="gbar"><i class="${c.pct>100?'hot':''}" style="width:${Math.min(100,c.pct)}%"></i></div></div>`).join('')}
     </div>
   </div>`;
  $('#sess').innerHTML=sessChart(ST.score_history);
}
function sessChart(h){ const W=440,H=170,pad=34; const vals=h.map(p=>p.value);
  const lo=Math.min(...vals),hi=Math.max(...vals);
  const x=i=>pad+i*(W-2*pad)/Math.max(1,h.length-1), y=v=>H-pad-(v-lo)/((hi-lo)||1)*(H-2*pad);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%"><polyline class="ln" points="${h.map((p,i)=>`${x(i)},${y(p.value)}`).join(' ')}"/>
   ${h.map((p,i)=>`<circle class="dotp" cx="${x(i)}" cy="${y(p.value)}" r="3"/>
   <text x="${x(i)}" y="${H-8}" text-anchor="middle">${esc(p.label)}</text>
   <text x="${x(i)}" y="${y(p.value)-8}" text-anchor="middle">${p.value}</text>`).join('')}</svg>`; }

boot();
</script>
